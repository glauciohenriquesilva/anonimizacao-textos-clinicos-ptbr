{% extends "base.html" %}

{% block title %}{{ acao }} Experimento{% endblock %}

{% block content %}
<h4 class="mb-4">
  <i class="bi bi-journal-text me-2 text-primary"></i>{{ acao }} Experimento
</h4>

<div class="card">
  <div class="card-body">
    <form method="post">
      {% csrf_token %}
      <div class="mb-3">
        <label class="form-label fw-semibold">Nome</label>
        <input type="text" name="nome" class="form-control"
               value="{{ exp.nome|default:'' }}" required />
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">Descrição</label>
        <textarea name="descricao" class="form-control" rows="3">{{ exp.descricao|default:'' }}</textarea>
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">Observações</label>
        <textarea name="obs" class="form-control" rows="4"
                  placeholder="Anotações livres sobre este experimento...">{{ exp.obs|default:'' }}</textarea>
      </div>
      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary">
          <i class="bi bi-check-lg me-1"></i>Salvar
        </button>
        <a href="{% url 'analise_exploratoria:listar_experimentos' %}" class="btn btn-outline-secondary">
          Cancelar
        </a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
