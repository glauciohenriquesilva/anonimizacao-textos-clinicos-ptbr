<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}AnonClin{% endblock %}</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <style>
      body {
        background-color: #f8f9fa;
      }
      .sidebar {
        min-height: 100vh;
        background-color: #212529;
      }
      .sidebar .nav-link {
        color: #adb5bd;
      }
      .sidebar .nav-link:hover,
      .sidebar .nav-link.active {
        color: #fff;
      }
      .metric-card {
        border-left: 4px solid #0d6efd;
      }
    </style>
  </head>
  <body>
    <div class="container-fluid">
      <div class="row">
        <!-- Sidebar -->
        <nav class="col-md-2 sidebar p-3">
          <h6 class="text-white mb-3">AnonClin</h6>
          <ul class="nav flex-column">
            <li class="nav-item">
              <span class="nav-link text-secondary" style="font-size:0.75rem; text-transform:uppercase; letter-spacing:0.05em;">
                Análise Exploratória
              </span>
            </li>
            <li class="nav-item ps-2">
              <a href="{% url 'analise_exploratoria:index' %}" class="nav-link">
                <i class="bi bi-bar-chart me-2"></i>Nova Análise
              </a>
            </li>
            <li class="nav-item ps-2">
              <a href="{% url 'analise_exploratoria:listar_execucoes' %}" class="nav-link">
                <i class="bi bi-clock-history me-2"></i>Execuções
              </a>
            </li>
          </ul>
        </nav>

        <!-- Conteúdo principal -->
        <main class="col-md-10 p-4">
          {% if messages %}
            {% for message in messages %}
              <div class="alert alert-{{ message.tags|default:'success' }} alert-dismissible fade show" role="alert">
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
              </div>
            {% endfor %}
          {% endif %}
          {% block content %}{% endblock %}
        </main>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    {% block scripts %}{% endblock %}
  </body>
</html>
